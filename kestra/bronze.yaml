id: mds_tracker_bronze
namespace: dev.krish
description: 'Modern Data Stack GitHub Tracker - Bronze Layer'

tasks:
  - id: bronze_layer_pipeline
    type: io.kestra.plugin.core.flow.WorkingDirectory
    tasks:
      - id: clone_repo
        type: io.kestra.plugin.git.Clone
        url: https://github.com/krish007code/load.py.git
        branch: main

      - id: run_python_script
        type: io.kestra.plugin.scripts.python.Commands
        taskRunner:
          type: io.kestra.plugin.scripts.runner.docker.Docker
          networkMode: tracker-pipeline_data_pipeline_net 
        containerImage: ghcr.io/kestra-io/kestrapy:latest
        beforeCommands:
          - uv pip install "dlt[s3]" --system
        commands:
          - python load.py
          
        env:
          SOURCES__GITHUB__ACCESS_TOKEN: "{{ kv('GITHUB_TOKEN') }}"
          
          DESTINATION__FILESYSTEM__DESTINATION_TYPE: "filesystem"
          DESTINATION__FILESYSTEM__BUCKET_URL: "s3://bronze"
          
          DESTINATION__FILESYSTEM__CREDENTIALS__ENDPOINT_URL: "http://minio:9000"
          DESTINATION__FILESYSTEM__CREDENTIALS__AWS_ACCESS_KEY_ID: "{{ kv('MINIO_ACCESS_KEY') }}"
          DESTINATION__FILESYSTEM__CREDENTIALS__AWS_SECRET_ACCESS_KEY: "{{ kv('MINIO_SECRET_KEY') }}"
          
